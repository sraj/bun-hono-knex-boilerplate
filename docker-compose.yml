services:
  postgres:
    image: postgres:17.5-alpine3.21
    container_name: boilerplate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: boilerplate_db
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  clickstack:
    image: clickhouse/clickstack-all-in-one:latest
    container_name: boilerplate-clickstack
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "8080:8080"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - clickstack-db:/data/db
      - clickstack-ch-data:/var/lib/clickhouse
      - clickstack-ch-logs:/var/log/clickhouse-server

volumes:
  postgres-data:
  clickstack-db:
  clickstack-ch-data:
  clickstack-ch-logs:
