name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: boilerplate_db
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Lint
        run: bun run ci

      - name: Build
        run: bun run build

      - name: Migrate database
        run: bun run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:15432/boilerplate_db
          BETTER_AUTH_SECRET: ci-test-secret

      - name: Test with coverage
        run: bun run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:15432/boilerplate_db
          BETTER_AUTH_SECRET: ci-test-secret
          NODE_ENV: test
